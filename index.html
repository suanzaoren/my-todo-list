<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的待办清单</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title"><span class="title-icon" aria-hidden="true">📝</span> 我的待办清单</h1>
      <p class="subtitle">记录今天要做的事</p>
    </header>

    <form class="add-form" id="addForm">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="今天要做什么？"
        autocomplete="off"
        maxlength="200"
      >
      <select id="prioritySelect" class="priority-select" aria-label="任务优先级">
        <option value="high">高优先级</option>
        <option value="medium" selected>中优先级</option>
        <option value="low">低优先级</option>
      </select>
      <button type="submit" class="btn btn-primary">➕ 添加任务</button>
    </form>

    <div class="stats" id="stats">
      <span class="stat stat-pending">
        <span class="stat-num" id="pendingCount">0</span>
        <span class="stat-label">未完成</span>
      </span>
      <span class="stat-divider"></span>
      <span class="stat stat-done">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">已完成</span>
      </span>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-secondary" id="clearAllBtn" disabled>全部清空</button>
      <button type="button" class="btn btn-secondary" id="clearDoneBtn" disabled>清空已完成</button>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon" aria-hidden="true">🌟</div>
      <p class="empty-title">清单还是空的</p>
      <p class="empty-desc">在上面输入任务，开启高效的一天吧！</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
